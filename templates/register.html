<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Smart Pill Reminder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border: none; }
    </style>
</head>
<body>
    <div class="card bg-white">
        <h3 class="text-center mb-4 fw-bold">Create Account</h3>
        <form action="/register" method="POST">
            <div class="mb-3">
                <label class="form-label text-muted fw-bold">Username</label>
                <input type="text" class="form-control form-control-lg" name="username" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted fw-bold">Password</label>
                <input type="password" class="form-control form-control-lg" name="password" required>
            </div>
            <button type="submit" class="btn btn-success w-100 rounded-pill p-2 fw-bold">Register</button>
        </form>
        <div class="text-center mt-3">
            <small class="text-muted"><a href="/" class="text-decoration-none">Back to Login</a></small>
        </div>
    </div>
</body>
</html>
